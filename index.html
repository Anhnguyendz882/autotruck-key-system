<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>AutoTruck Panel</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
}

.box{
background:#1e293b;
padding:40px;
border-radius:10px;
}

input{
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
margin-top:15px;
border:none;
background:#3b82f6;
color:white;
border-radius:6px;
}

table{
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #555;
padding:10px 15px;
}

</style>

</head>

<body>

<div id="login" class="box">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">

<br>

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none">

<h1>Key Dashboard</h1>

<table id="keys">

<tr>
<th>Key</th>
<th>Player</th>
<th>Expire</th>
</tr>

</table>

</div>

<script>

function login(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

if(user==="kn" && pass==="929392Huy"){

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

loadKeys()

}else{

alert("Wrong login")

}

}

function loadKeys(){

fetch("/keys")
.then(res=>res.json())
.then(data=>{

const table=document.getElementById("keys")

data.forEach(k=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${k.key}</td>
<td>${k.player}</td>
<td>${new Date(k.expire*1000).toLocaleDateString()}</td>
`

table.appendChild(row)

})

})

}

</script>

</body>
</html>
